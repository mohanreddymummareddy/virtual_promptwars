<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StadiaSync | Physical Event Experience</title>
    <meta name="description" content="Improves the physical event experience for attendees at large-scale sporting venues.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="glass-bg"></div>
    
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo">
                <span class="logo-icon">🏟️</span>
                <h1>StadiaSync</h1>
            </div>
            <div class="status-badge" id="globalStatus">
                <span class="pulse-dot green"></span> Live Sync
            </div>
        </header>

        <main>
            <!-- Announcement Banner -->
            <section class="announcement-card" id="announcementBanner">
                <div class="icon">⚠️</div>
                <div class="content">
                    <h3 id="announcementTitle">Loading...</h3>
                    <p id="announcementMessage">Fetching updates...</p>
                </div>
            </section>

            <div class="dashboard-grid">
                <!-- Heatmap / Zones -->
                <section class="dashboard-panel heatmap-panel">
                    <h2>Live Venue Heatmap</h2>
                    <!-- Camera Feed -->
                    <div class="camera-container" style="margin-bottom: 2rem; position: relative;">
                        <video id="crowdCamera" autoplay playsinline style="width: 100%; border-radius: 1rem; border: 1px solid var(--border-color); background: #000; min-height: 200px;"></video>
                        <div style="position: absolute; top: 1rem; right: 1rem; background: rgba(0,0,0,0.6); padding: 0.5rem; border-radius: 0.5rem; font-size: 0.8rem; color: #10b981; border: 1px solid #10b981; display: flex; align-items: center; gap: 0.5rem;">
                            <span class="pulse-dot green" style="width: 6px; height: 6px;"></span> Crowd Detection Active
                        </div>
                    </div>
                    <div class="zone-grid" id="zoneGrid">
                        <!-- Zones injected by JS -->
                        <div class="loading-spinner"></div>
                    </div>
                </section>

                <!-- Smart Routing / Recommendations -->
                <section class="dashboard-panel routing-panel">
                    <h2>Smart Routing</h2>
                    <div class="recommendation-list">
                        <div class="rec-item best">
                            <div class="rec-icon">✅</div>
                            <div class="rec-details">
                                <h4>Fastest Restroom</h4>
                                <p>Zone C - South Restrooms (2 min wait)</p>
                            </div>
                        </div>
                        <div class="rec-item avoid">
                            <div class="rec-icon">🛑</div>
                            <div class="rec-details">
                                <h4>Avoid</h4>
                                <p>Zone A - North Gate (15 min wait)</p>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Script to fetch and render data -->
    <script>
        async function fetchStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                // Update announcement
                document.getElementById('announcementTitle').textContent = data.announcement.title;
                document.getElementById('announcementMessage').textContent = data.announcement.message;
                
                // Update zones
                const zoneGrid = document.getElementById('zoneGrid');
                zoneGrid.innerHTML = '';
                
                data.zones.forEach(zone => {
                    const colorClass = zone.status.toLowerCase();
                    const card = document.createElement('div');
                    card.className = \`zone-card \${colorClass}\`;
                    
                    card.innerHTML = \`
                        <div class="zone-header">
                            <span class="zone-id">Zone \${zone.id}</span>
                            <span class="status-indicator"></span>
                        </div>
                        <h3>\${zone.name}</h3>
                        <div class="metrics">
                            <div class="metric">
                                <span class="label">Wait Time</span>
                                <span class="value">\${zone.wait_time_mins} min</span>
                            </div>
                            <div class="metric">
                                <span class="label">Congestion</span>
                                <span class="value">\${zone.congestion}%</span>
                            </div>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill \${colorClass}-bg" style="width: \${zone.congestion}%"></div>
                        </div>
                    \`;
                    zoneGrid.appendChild(card);
                });
                
            } catch (error) {
                console.error("Error fetching status:", error);
            }
        }

        // Initial fetch and poll every 10 seconds
        fetchStatus();
        setInterval(fetchStatus, 10000);

        // Initialize Camera for Live View Heatmap
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                const videoEl = document.getElementById('crowdCamera');
                videoEl.srcObject = stream;
            } catch (err) {
                console.error("Camera access denied or unavailable", err);
            }
        }
        
        // Start camera on load
        window.addEventListener('load', initCamera);
    </script>
</body>
</html>
