<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StadiaSync | Physical Event Experience</title>
    <meta name="description" content="Improves the physical event experience for attendees at large-scale sporting venues.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <!-- TensorFlow.js and Coco-SSD Model -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
</head>
<body>
    <div class="glass-bg"></div>
    
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo">
                <span class="logo-icon">🏟️</span>
                <h1>StadiaSync</h1>
            </div>
            <div class="status-badge" id="globalStatus">
                <span class="pulse-dot green"></span> Live Sync
            </div>
        </header>

        <main>
            <!-- Announcement Banner -->
            <section class="announcement-card" id="announcementBanner">
                <div class="icon">⚠️</div>
                <div class="content">
                    <h3 id="announcementTitle">Loading...</h3>
                    <p id="announcementMessage">Fetching updates...</p>
                </div>
            </section>

            <div class="dashboard-grid">
                <!-- Heatmap / Zones -->
                <section class="dashboard-panel heatmap-panel">
                    <h2>Live Venue Heatmap</h2>
                    <!-- Camera Feed -->
                    <div class="camera-container" style="margin-bottom: 2rem; position: relative;">
                        <video id="crowdCamera" autoplay playsinline style="width: 100%; border-radius: 1rem; border: 1px solid var(--border-color); background: #000; min-height: 200px; display: block;"></video>
                        <canvas id="overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 1rem; pointer-events: none;"></canvas>
                        <div id="aiStatus" style="position: absolute; top: 1rem; right: 1rem; background: rgba(0,0,0,0.6); padding: 0.5rem; border-radius: 0.5rem; font-size: 0.8rem; color: #f59e0b; border: 1px solid #f59e0b; display: flex; align-items: center; gap: 0.5rem;">
                            <span class="pulse-dot" style="width: 6px; height: 6px; background-color: #f59e0b; display: inline-block; border-radius: 50%;"></span> AI Model Loading...
                        </div>
                    </div>
                    
                    <div class="zone-grid" id="zoneGrid">
                        <!-- Zones injected by JS -->
                        <div class="loading-spinner"></div>
                    </div>
                </section>

                <!-- Smart Routing / Recommendations -->
                <section class="dashboard-panel routing-panel">
                    <h2>Smart Routing</h2>
                    <div class="recommendation-list">
                        <div class="rec-item best">
                            <div class="rec-icon">✅</div>
                            <div class="rec-details">
                                <h4>Fastest Restroom</h4>
                                <p>Zone C - South Restrooms (2 min wait)</p>
                            </div>
                        </div>
                        <div class="rec-item avoid">
                            <div class="rec-icon">🛑</div>
                            <div class="rec-details">
                                <h4>Avoid</h4>
                                <p>Zone A - North Gate (15 min wait)</p>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
