<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StadiaSync | Physical Event Experience</title>
    <meta name="description" content="Improves the physical event experience for attendees at large-scale sporting venues.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <!-- TensorFlow.js and Coco-SSD Model -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
</head>
<body>
    <div class="glass-bg"></div>
    
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo">
                <span class="logo-icon">🏟️</span>
                <h1>StadiaSync</h1>
            </div>
            <div class="status-badge" id="globalStatus">
                <span class="pulse-dot green"></span> Live Sync
            </div>
        </header>

        <main>
            <!-- Announcement Banner -->
            <section class="announcement-card" id="announcementBanner">
                <div class="icon">⚠️</div>
                <div class="content">
                    <h3 id="announcementTitle">Loading...</h3>
                    <p id="announcementMessage">Fetching updates...</p>
                </div>
            </section>

            <div class="dashboard-grid">
                <!-- Heatmap / Zones -->
                <section class="dashboard-panel heatmap-panel">
                    <h2>Live Venue Heatmap</h2>
                    <!-- Camera Feed -->
                    <div class="camera-container" style="margin-bottom: 2rem; position: relative;">
                        <video id="crowdCamera" autoplay playsinline style="width: 100%; border-radius: 1rem; border: 1px solid var(--border-color); background: #000; min-height: 200px; display: block;"></video>
                        <canvas id="overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 1rem; pointer-events: none;"></canvas>
                        <div id="aiStatus" style="position: absolute; top: 1rem; right: 1rem; background: rgba(0,0,0,0.6); padding: 0.5rem; border-radius: 0.5rem; font-size: 0.8rem; color: #f59e0b; border: 1px solid #f59e0b; display: flex; align-items: center; gap: 0.5rem;">
                            <span class="pulse-dot" style="width: 6px; height: 6px; background-color: #f59e0b; display: inline-block; border-radius: 50%;"></span> AI Model Loading...
                        </div>
                    </div>
                    
                    <div class="zone-grid" id="zoneGrid">
                        <!-- Zones injected by JS -->
                        <div class="loading-spinner"></div>
                    </div>
                </section>

                <!-- Smart Routing / Recommendations -->
                <section class="dashboard-panel routing-panel">
                    <h2>Smart Routing</h2>
                    <div class="recommendation-list">
                        <div class="rec-item best">
                            <div class="rec-icon">✅</div>
                            <div class="rec-details">
                                <h4>Fastest Restroom</h4>
                                <p>Zone C - South Restrooms (2 min wait)</p>
                            </div>
                        </div>
                        <div class="rec-item avoid">
                            <div class="rec-icon">🛑</div>
                            <div class="rec-details">
                                <h4>Avoid</h4>
                                <p>Zone A - North Gate (15 min wait)</p>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script>
        // Global variables for AI
        let globalModel = null;
        let peopleCount = 0;

        async function fetchStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                // Update announcement
                document.getElementById('announcementTitle').textContent = data.announcement.title;
                document.getElementById('announcementMessage').textContent = data.announcement.message;
                
                // Update zones
                const zoneGrid = document.getElementById('zoneGrid');
                zoneGrid.innerHTML = '';
                
                data.zones.forEach(zone => {
                    // Inject AI data dynamically over the dummy backend for the user's camera zone
                    if (zone.id === 'A') {
                        zone.name = "Local Sector (Camera)";
                        zone.congestion = Math.min(100, peopleCount * 25); // Set 4 people = 100% capacity for demo purposes
                        zone.wait_time_mins = peopleCount * 5;
                        if (zone.congestion > 70) zone.status = 'Red';
                        else if (zone.congestion > 30) zone.status = 'Yellow';
                        else zone.status = 'Green';
                    }

                    const colorClass = zone.status.toLowerCase();
                    const card = document.createElement('div');
                    card.className = `zone-card ${colorClass}`;
                    
                    card.innerHTML = `
                        <div class="zone-header">
                            <span class="zone-id">Zone ${zone.id}</span>
                            <span class="status-indicator"></span>
                        </div>
                        <h3>${zone.name}</h3>
                        <div class="metrics">
                            <div class="metric">
                                <span class="label">Wait Time</span>
                                <span class="value">${zone.wait_time_mins} min</span>
                            </div>
                            <div class="metric">
                                <span class="label">Congestion</span>
                                <span class="value">${zone.congestion}%</span>
                            </div>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill ${colorClass}-bg" style="width: ${zone.congestion}%"></div>
                        </div>
                    `;
                    zoneGrid.appendChild(card);
                });
                
            } catch (error) {
                console.error("Error fetching status:", error);
            }
        }

        // Initialize Camera and AI Model
        async function initCamera() {
            try {
                // Request camera permission
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const videoEl = document.getElementById('crowdCamera');
                videoEl.srcObject = stream;
                
                // Wait for video dimensions to load before setting up canvas
                videoEl.onloadedmetadata = async () => {
                    // Load the AI model
                    try {
                        globalModel = await cocoSsd.load();
                        
                        // Update UI status
                        const statusBadge = document.getElementById('aiStatus');
                        statusBadge.style.color = '#10b981';
                        statusBadge.style.borderColor = '#10b981';
                        statusBadge.innerHTML = `<span class="pulse-dot green" style="width: 6px; height: 6px; display: inline-block; border-radius: 50%; background: #10b981;"></span> Crowd Detection Active`;
                        
                        // Start detection loop
                        detectFrame();
                    } catch (modelErr) {
                        console.error("Model failed to load:", modelErr);
                        document.getElementById('aiStatus').innerHTML = `❌ Model Error`;
                    }
                };
            } catch (err) {
                console.error("Camera access denied or unavailable", err);
                document.getElementById('aiStatus').innerHTML = `❌ Camera Error`;
                document.getElementById('aiStatus').style.color = '#ef4444';
                document.getElementById('aiStatus').style.borderColor = '#ef4444';
            }
        }
        
        async function detectFrame() {
            if (!globalModel) return;
            
            const videoEl = document.getElementById('crowdCamera');
            const canvas = document.getElementById('overlay');
            const ctx = canvas.getContext('2d');
            
            if (videoEl.readyState === 4) {
                // Ensure canvas matches video dimensions exactly
                canvas.width = videoEl.videoWidth;
                canvas.height = videoEl.videoHeight;
                
                // Run inference
                const predictions = await globalModel.detect(videoEl);
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                let detectedPeople = 0;
                
                predictions.forEach(prediction => {
                    // We only care about people for crowd detection
                    if (prediction.class === 'person') {
                        detectedPeople++;
                        const [x, y, width, height] = prediction.bbox;
                        
                        // Draw glowing box
                        ctx.strokeStyle = '#10b981';
                        ctx.lineWidth = 3;
                        ctx.strokeRect(x, y, width, height);
                        
                        // Draw label background
                        ctx.fillStyle = '#10b981';
                        ctx.fillRect(x, y > 25 ? y - 25 : 0, 110, 25);
                        
                        // Draw text
                        ctx.fillStyle = '#111';
                        ctx.font = '14px Outfit, sans-serif';
                        ctx.fontWeight = 'bold';
                        ctx.fillText(`Person (${Math.round(prediction.score * 100)}%)`, x + 5, y > 10 ? y - 8 : 17);
                    }
                });
                
                // Update global count for the dashboard
                peopleCount = detectedPeople;
            }
            
            // Loop recursively tailored to browser repaints
            requestAnimationFrame(detectFrame);
        }

        // Start execution
        window.addEventListener('load', () => {
            fetchStatus();
            initCamera();
            setInterval(fetchStatus, 3000); // Polling faster to show AI responsiveness
        });
    </script>
</body>
</html>
